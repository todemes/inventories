<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Directory - Uniform Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">Uniform Inventory</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav flex-grow-1">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Stock</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="staff.html">Staff Assignments</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="staff-directory.html">Staff Directory</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="history.html">History</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <div id="flash-messages"></div>
                <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                    <h2>Staff Directory</h2>
                    <div class="d-flex gap-2 flex-wrap justify-content-start">
                        <button class="btn btn-stock-action" id="addStaffBtn">
                            <i class="bi bi-person-plus"></i> <span class="btn-text">Add Staff</span>
                        </button>
                        <button class="btn btn-stock-action" id="exportStaffCsvBtn">
                            <i class="bi bi-download"></i> <span class="btn-text">Export</span>
                        </button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <input type="text" id="staffDirectorySearch" class="form-control" placeholder="Search by name, department, status...">
                            </div>
                            <div class="col-md-3">
                                <select id="staffStatusFilter" class="form-select">
                                    <option value="all">All Statuses</option>
                                    <option value="active">Active</option>
                                    <option value="inactive">Inactive</option>
                                </select>
                            </div>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Full Name</th>
                                        <th>Department</th>
                                        <th>Starting Date</th>
                                        <th>DoB</th>
                                        <th>Status</th>
                                        <th class="text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="staffDirectoryBody">
                                    <!-- rows inserted dynamically -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="staffFormModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="staffFormModalTitle">Add Staff</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="staffForm">
                        <input type="hidden" id="staffFormId">
                        <div class="mb-3">
                            <label for="staffFormName" class="form-label">Name</label>
                            <input type="text" id="staffFormName" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="staffFormFullName" class="form-label">Full Name</label>
                            <input type="text" id="staffFormFullName" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label for="staffFormDepartment" class="form-label">Department</label>
                            <select id="staffFormDepartment" class="form-select" required></select>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="staffFormStartingDate" class="form-label">Starting Date</label>
                                <input type="date" id="staffFormStartingDate" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label for="staffFormBirthday" class="form-label">Date of Birth</label>
                                <input type="date" id="staffFormBirthday" class="form-control">
                            </div>
                        </div>
                        <div class="mt-3">
                            <label for="staffFormStatus" class="form-label">Status</label>
                            <select id="staffFormStatus" class="form-select">
                                <option value="active">Active</option>
                                <option value="inactive">Inactive</option>
                            </select>
                            <div id="staffFormStatusError" class="text-danger small mt-2 d-none"></div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" form="staffForm" class="btn btn-primary" id="staffFormSubmitBtn">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/utils/export.js"></script>
    <script src="js/staff-directory.js" type="module"></script>
</body>
</html>
